# Daily content generation.
#
# Runs the same code as the Vercel cron (lib/social/daily-generate-core.ts)
# but on GitHub Actions, which has no 60s function cap — long-form essays with
# a budget retry occasionally brushed Vercel's Hobby ceiling and got killed.
#
# ── CUTOVER STATUS: LIVE ────────────────────────────────────────────────────
# This is the scheduled daily generator (migrated off the Vercel cron, which
# was capped at 60s on the Hobby plan). The "/api/cron/daily-generate" Vercel
# cron has been removed from vercel.json. The route still exists for manual
# Bearer-authed triggers, but is no longer scheduled.
#
# Required GitHub Actions secrets / variables:
#   - DATABASE_URL   (secret — Neon postgres URL)
#   - GROQ_API_KEY   (secret — LLM key)
#   - GROQ_MODEL     (variable — defaults to llama-3.3-70b-versatile)
#   - GEMINI_API_KEY (secret — embeddings for RAG grounding; optional but
#                     without it drafts are flagged "low grounding")

name: daily-generate

on:
  schedule:
    # Target ~04:07 IST = 22:37 UTC. We intentionally pick an EARLIER, ODD
    # minute rather than the obvious 23:30 UTC (= 05:00 IST): GitHub delays
    # scheduled jobs at congested slots (top-of-hour, :30, midnight-UTC) by
    # 1–3 hours, so the old 23:30 cron consistently ran ~01:30 UTC (~07:00
    # IST). Scheduling ~1h earlier on an off-peak minute absorbs that drift so
    # drafts are usually ready for review by ~05:00 IST. (Cron is best-effort
    # on GitHub Actions — there is no on-time guarantee; trigger manually via
    # workflow_dispatch if you ever need drafts immediately.)
    - cron: "37 22 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # 5 picks + up to DAILY_GENERATE_TOPUP_MAX (4) replacement generations,
    # sequential with a 20s inter-job spacing to stay under Groq's TPM limit.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci --no-audit --no-fund

      - name: Generate daily drafts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: groq
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/daily-generate.ts

      - name: Summary
        if: always()
        run: |
          echo "### daily-generate summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "* trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "* status : ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/pipeline-alert
        with:
          title: "daily-generate workflow failed"
          body: |
            The daily content generator failed. Common causes: missing
            `GROQ_API_KEY` secret, LLM provider outage, or a DB connectivity
            issue. Check the run logs; drafts are not generated until this is
            green.
          token: ${{ github.token }}
