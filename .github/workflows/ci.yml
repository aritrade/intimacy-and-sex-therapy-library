name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel old runs on the same ref so PRs don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # -------------------------------------------------------------------------
  # Static checks: typecheck + lint. Fastest job, fail loud.
  # -------------------------------------------------------------------------
  static:
    name: typecheck + lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: sex-therapy-repo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sex-therapy-repo/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  # -------------------------------------------------------------------------
  # Unit tests with vitest. Pure-logic suite, no DB, no LLM.
  # -------------------------------------------------------------------------
  unit:
    name: unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: sex-therapy-repo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sex-therapy-repo/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  # -------------------------------------------------------------------------
  # Integration tests against an ephemeral Postgres+pgvector container.
  # The `services:` block boots pgvector/pgvector:pg16 with a healthcheck;
  # the test helper runs migrations + 0001_indexes.sql once and the specs
  # exercise schema, the ingestion pipeline, BM25 ranking, and the
  # forget-me cascade. No live LLM keys are required.
  # -------------------------------------------------------------------------
  integration:
    name: integration tests (postgres+pgvector)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: sex-therapy-repo
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stl_test
        ports:
          - 5499:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sex-therapy-repo/package-lock.json
      - run: npm ci
      - name: Run integration suite
        run: npm run test:integration
        env:
          INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5499/stl_test

  # -------------------------------------------------------------------------
  # Production build. Catches Next.js misconfig and missing env-guards.
  # No real env is set — the build must complete with placeholders.
  # -------------------------------------------------------------------------
  build:
    name: production build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: sex-therapy-repo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sex-therapy-repo/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Upload .next build for the e2e job
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: sex-therapy-repo/.next
          retention-days: 1

  # -------------------------------------------------------------------------
  # End-to-end with Playwright against the production build.
  # -------------------------------------------------------------------------
  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    defaults:
      run:
        working-directory: sex-therapy-repo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sex-therapy-repo/package-lock.json
      - run: npm ci
      - name: Restore .next from build job
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: sex-therapy-repo/.next
      - name: Install Playwright browsers
        run: npm run test:e2e:install
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
          CI: "true"
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: sex-therapy-repo/playwright-report
          retention-days: 7

  # -------------------------------------------------------------------------
  # Preflight: confirms the deploy contract holds. Does not require live
  # secrets — most checks gracefully fail-with-detail on missing env, which
  # is the documented behaviour we want to verify.
  # -------------------------------------------------------------------------
  preflight:
    name: preflight (no-secrets dry run)
    runs-on: ubuntu-latest
    timeout-minutes: 6
    defaults:
      run:
        working-directory: sex-therapy-repo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sex-therapy-repo/package-lock.json
      - run: npm ci
      - name: Run preflight (allowed to fail; we only assert it does not crash)
        run: npm run preflight || true
        env:
          # KMS local key so the KMS round-trip check is exercised in CI.
          KMS_PROVIDER: local
          KMS_LOCAL_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
