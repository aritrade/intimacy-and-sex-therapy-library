name: Eval (nightly)

# Adversarial eval harness against the live LLM provider.
#
# This workflow is intentionally OFF by default for forks and PRs (it spends
# real money). It runs:
#   - on a nightly cron (UTC 02:00),
#   - or on demand via the Actions tab.
#
# Required repo secrets to actually run a meaningful pass:
#   ANTHROPIC_API_KEY, OPENAI_API_KEY
#
# The harness writes per-run JSON reports to ./eval-reports/<ts>.json. We
# upload them as artifacts and DO NOT commit them back.

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      category:
        description: "Filter to one red-team category (optional)"
        required: false
      limit:
        description: "Cap N prompts per category (optional)"
        required: false

jobs:
  eval:
    name: adversarial eval
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Run eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOG_LEVEL: info
        run: |
          ARGS=""
          if [ -n "${{ inputs.category }}" ]; then ARGS="$ARGS --category=${{ inputs.category }}"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit=${{ inputs.limit }}"; fi
          npm run eval -- $ARGS
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval-reports
          retention-days: 30
