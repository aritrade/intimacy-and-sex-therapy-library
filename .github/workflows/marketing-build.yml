name: marketing-build

# Regenerates ALL marketing collateral on GitHub's runners — proving the deck,
# the investor explainer, and the homepage primer film have no dependency on
# anyone's Mac. Manual trigger only (these are expensive renders, and the
# artifacts rarely change). Commits the refreshed files back to the branch.
on:
  workflow_dispatch:
    inputs:
      targets:
        description: "Which artefacts to build"
        type: choice
        default: all
        options: [all, primer, explainer, deck]

permissions:
  contents: write

concurrency:
  group: marketing-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system deps (ffmpeg + serif/sans fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-dejavu-extra

      - name: Install Python deps
        run: pip install --upgrade edge-tts Pillow python-pptx lxml

      - name: Install npm deps
        run: npm ci --no-audit --no-fund

      - name: Cache Remotion / Chrome headless shell
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/remotion
            node_modules/.cache
          key: remotion-cache-v1-${{ hashFiles('package-lock.json', 'video-factory/**') }}
          restore-keys: |
            remotion-cache-v1-

      # The primer is a Remotion motion-design film. Build the narration track
      # first (Edge TTS → one voiceover + per-scene timings), then render the
      # composition silent and mux the audio on. Fonts (Lora/Inter) load via
      # @remotion/google-fonts so the render is identical to a local Mac build.
      - name: Build primer film
        if: ${{ inputs.targets == 'all' || inputs.targets == 'primer' }}
        run: |
          python3 marketing/primer/build_audio.py
          npx tsx scripts/render-primer.ts

      - name: Build investor explainer
        if: ${{ inputs.targets == 'all' || inputs.targets == 'explainer' }}
        run: python3 marketing/pitch-video/build_video.py

      - name: Build pitch deck
        if: ${{ inputs.targets == 'all' || inputs.targets == 'deck' }}
        run: python3 marketing/pitch-deck/build_deck.py

      - name: Commit refreshed artefacts
        run: |
          # Don't version the heavy intermediate work dirs.
          rm -rf marketing/primer/_work marketing/pitch-video/_work
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/marketing/primer.mp4 \
                  public/marketing/primer-poster.jpg \
                  marketing/pitch-video/*.mp4 \
                  marketing/pitch-deck/*.pptx 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No artefact changes to commit."
          else
            git commit -m "chore(marketing): regenerate collateral via CI [skip ci]"
            git push
          fi

      - name: Upload as workflow artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: marketing-collateral
          if-no-files-found: ignore
          path: |
            public/marketing/primer.mp4
            marketing/pitch-video/*.mp4
            marketing/pitch-deck/*.pptx
